<!DOCTYPE html>
<html class="no-js vlt-is--contact-01 vlt-is--header-fullscreen vlt-is--footer-style-1 vlt-is--footer-fixed" lang="en">

{% extends 'base.html' %}


{% block body %}
	<!--Site overlay-->

	<div class="vlt-site-overlay"></div>

	<!--Main-->
	<main class="vlt-main">
		<!--Page content-->
		<div class="vlt-page-content">
			<!--Page title-->
			<div class="vlt-page-title vlt-page-title--style-4">
				<div class="container">
					<div class="row">
						<div class="col-md-7 offset-md-1">
							<h1 class="vlt-page-title__title">We blog about our passions
							</h1>
						</div>
						<div class="col-md-3">
							<div class="vlt-page-title__phantom-title lax" data-lax-translate-x="0 0, vw (vw*0.5)" data-lax-opacity="1 1, 250 0" data-lax-anchor=".vlt-page-title">Blog
							</div>
						</div>
					</div>
				</div>
			</div>
			<div id="content"></div>


			<!--Section-->
			<section>
				<div class="vlt-gap-120"></div>
				<div class="container">
					<!-- <div class="text-center">
						<ul class="vlt-isotope-filters" id="vlt-filter-blog-06">
							<li class="active" data-filter="*"><span>All</span></li>
							<li data-filter=".filter-company"><span>Company</span></li>
							<li data-filter=".filter-design"><span>Design</span></li>
							<li data-filter=".filter-lifestyle"><span>Lifestyle</span></li>
							<li data-filter=".filter-business"><span>Business</span></li>
						</ul>
					</div> -->
					<div class="vlt-gap-90"></div>
					<div class="row">
						<div class="col-md-10 offset-md-1">
							<div class="vlt-isotope-grid" data-columns="1" data-layout="masonry" data-x-gap="0|0" data-y-gap="80|80" data-controls="#vlt-filter-blog-02" data-load-more-selector="#vlt-load-more-blog-02">
								<div class="grid-sizer"></div>
								{% for post in posts %}
								<div class=" grid-item filter-design">
									<!--Blog item-->
									<article class="vlt-post vlt-post--style-4">
										<div class="vlt-post__media"><a class="vlt-post__link" href="/post/{{ post.slug }}"></a><img src="{{ post.thumbnail }}" alt="" loading="lazy">
										</div>
										<div class="vlt-post__content">
											<header class="vlt-post__header">
												<div class="vlt-post-meta"><span>{{ post.published_date }}</span><span>{{ post.category.title  }}</span>
												</div>
												<h3 class="vlt-post-title"><a href="/post/{{ post.slug }}">{{ post.title }}</a>
												</h3>
											</header>
											<div class="vlt-post-excerpt">
												<p>{{ post.brief }}</p>
											</div>
										</div>
									</article>
								</div>
								{% endfor %}
							</div>
							<div class="vlt-gap-100"></div>
							<div class="text-center">
								<!-- <div id="vlt-load-more-blog-02">
										<a class="vlt-isotope-load-more" href="#">
										<i class="icon-arrow-down"></i>
									</a>
								</div> -->
							</div>
						</div>
					</div>
				</div>
				<div class="vlt-gap-120"></div>
			</section>
		</div>
	</main>

{% endblock body%}
